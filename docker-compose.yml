services:
  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dpdr_symptom_management}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dpdr_symptom_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/dpdr_symptom_management?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-development-auth-secret}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-demo12345}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CDS DPDR}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://CDS.depersonalization.site}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["bootstrap"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/dpdr_symptom_management?schema=public}
      AUTH_SECRET: ${AUTH_SECRET:-development-auth-secret}
      SEED_DEMO_PASSWORD: ${SEED_DEMO_PASSWORD:-demo12345}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CDS DPDR}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://CDS.depersonalization.site}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    command: sh -lc "npm run db:push && npm run db:seed"

volumes:
  postgres-data: